name: chat-app

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    # Published so `docker compose up -d mongo redis` supports local `npm run dev`.
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - chatnet

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - chatnet

  api:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    environment:
      MONGO_URI: mongodb://mongo:27017/chatapp
      REDIS_URL: redis://redis:6379
      PM2_INSTANCES: 2
    expose:
      - "4000"
    volumes:
      - uploads:/app/uploads
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - chatnet

  web:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8080}
        VITE_SOCKET_URL: ${VITE_SOCKET_URL:-http://localhost:8080}
    restart: unless-stopped
    depends_on:
      - api
    networks:
      - chatnet

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - uploads:/app/uploads:ro
    depends_on:
      - api
      - web
    networks:
      - chatnet

volumes:
  mongo_data:
  redis_data:
  uploads:

networks:
  chatnet:
    driver: bridge
