user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log  warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';
    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    server_tokens   off;

    # ─── Uploads / large payloads ────────────────────────────────────
    client_max_body_size  30m;

    # ─── Proxy timeouts ──────────────────────────────────────────────
    proxy_connect_timeout  60s;
    proxy_send_timeout     60s;
    proxy_read_timeout     60s;

    # ─── Gzip ────────────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_comp_level   5;
    gzip_min_length   256;
    gzip_proxied      any;
    gzip_types        text/plain text/css text/javascript application/javascript
                      application/json application/xml image/svg+xml font/woff2;

    # ─── WebSocket upgrade mapping (Socket.IO) ───────────────────────
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # ─── Upstreams ───────────────────────────────────────────────────
    # ip_hash keeps a client pinned to one API instance — required for
    # Socket.IO sticky sessions across multiple PM2/replica processes.
    upstream api {
        ip_hash;
        server api:4000;
    }

    upstream web {
        server web:80;
    }

    include /etc/nginx/conf.d/*.conf;
}
